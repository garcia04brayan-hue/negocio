<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catálogo Naturales – Farmacias Yair</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --forest:    #2d6a4f;
      --forest-lt: #e8f5ee;
      --forest-dk: #1b4332;
      --moss:      #52b788;
      --moss-lt:   #d8f3dc;
      --herb:      #74c69d;
      --amber:     #d4883a;
      --amber-lt:  #fef3e2;
      --amber-dk:  #996022;
      --honey:     #f5a623;
      --terra:     #bc6c25;
      --terra-lt:  #fde8d0;
      --terra-dk:  #7f3f0a;
      --lavender:  #9b72cf;
      --lavender-lt:#f0e9fb;
      --lavender-dk:#5e3a9e;
      --sky:       #48b0d5;
      --sky-lt:    #e4f4fb;
      --sky-dk:    #1e7fa8;
      --rose:      #c07b8a;
      --rose-lt:   #faeef1;
      --rose-dk:   #8a3d52;
      --cream:     #fdfaf4;
      --warm:      #faf6ed;
      --sand:      #f3ead8;
      --gray:      #e2d9c8;
      --text:      #1e2a1a;
      --muted:     #7a7060;
      --bark:      #1a1208;
    }
    html { scroll-behavior:smooth; }
    body { font-family:'Nunito',sans-serif; background:var(--cream); color:var(--text); overflow-x:hidden; }

    /* ── HEADER ── */
    header {
      background:var(--forest-dk);
      position:sticky; top:0; z-index:300;
      box-shadow:0 2px 20px rgba(27,67,50,0.4);
    }
    .hdr {
      max-width:1200px; margin:0 auto; padding:11px 36px;
      display:flex; align-items:center; justify-content:space-between; gap:20px;
    }
    .logo-wrap { display:flex; align-items:center; gap:14px; text-decoration:none; }
    .logo-wrap img { height:46px; width:auto; filter:brightness(0) invert(1); }
    .hdr-sep { width:1px; height:28px; background:rgba(255,255,255,0.2); }
    .hdr-title { font-size:0.72rem; font-weight:800; letter-spacing:0.14em; text-transform:uppercase; color:var(--moss); display:flex; align-items:center; gap:7px; }
    .hdr-nav { display:flex; align-items:center; gap:8px; }
    .hdr-nav a {
      color:rgba(255,255,255,0.6); text-decoration:none; font-size:0.83rem; font-weight:700;
      padding:7px 14px; border-radius:20px; transition:background .18s,color .18s;
    }
    .hdr-nav a:hover { background:rgba(255,255,255,0.1); color:#fff; }
    .btn-back { background:var(--moss)!important; color:var(--forest-dk)!important; font-weight:800!important; }
    .btn-back:hover { background:var(--herb)!important; }

    /* ── HERO ── */
    .hero {
      background:linear-gradient(150deg,var(--forest-dk) 0%,#2d5a3d 45%,#1e4a30 100%);
      padding:72px 36px 80px; position:relative; overflow:hidden;
    }
    .hero::before {
      content:''; position:absolute; inset:0;
      background:
        radial-gradient(circle at 75% 25%,rgba(82,183,136,0.18),transparent 48%),
        radial-gradient(circle at 15% 70%,rgba(212,136,58,0.10),transparent 42%),
        radial-gradient(circle at 50% 95%,rgba(155,114,207,0.07),transparent 38%);
    }
    /* Organic leaf deco */
    .leaf-deco {
      position:absolute; font-size:5rem; opacity:0.06;
      pointer-events:none; animation:sway ease-in-out infinite;
    }
    @keyframes sway {
      0%,100% { transform:rotate(-6deg) scale(1); }
      50%      { transform:rotate(6deg) scale(1.05); }
    }
    .hero-inner {
      max-width:1200px; margin:0 auto;
      display:grid; grid-template-columns:1fr 1fr;
      align-items:center; gap:64px; position:relative; z-index:1;
    }
    .hero-pill {
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(82,183,136,0.2); border:1.5px solid rgba(82,183,136,0.4);
      color:var(--moss); border-radius:30px; padding:6px 18px;
      font-size:0.74rem; font-weight:800; letter-spacing:0.1em;
      text-transform:uppercase; margin-bottom:18px;
    }
    .hero-text h1 {
      font-family:'Playfair Display',serif;
      font-size:clamp(2.4rem,4.2vw,3.6rem);
      font-weight:800; line-height:1.12; color:#fff; margin-bottom:16px;
    }
    .hero-text h1 em { font-style:italic; color:var(--moss); }
    .hero-text p {
      font-size:1rem; color:rgba(255,255,255,0.62);
      line-height:1.72; max-width:430px; margin-bottom:30px;
    }
    .hero-stats { display:flex; gap:0; }
    .h-stat {
      padding:14px 26px; text-align:center;
      border-left:1px solid rgba(255,255,255,0.1);
    }
    .h-stat:first-child { border-left:none; padding-left:0; }
    .h-stat strong {
      display:block; font-family:'Playfair Display',serif;
      font-size:1.9rem; color:var(--moss); font-weight:700; line-height:1;
    }
    .h-stat span {
      font-size:0.71rem; color:rgba(255,255,255,0.45);
      font-weight:700; letter-spacing:0.07em; text-transform:uppercase;
      margin-top:4px; display:block;
    }

    /* hero product mosaic */
    .hero-mosaic {
      display:grid; grid-template-columns:repeat(3,1fr);
      grid-template-rows:auto auto; gap:14px;
    }
    .mosaic-card {
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.12);
      border-radius:20px; padding:18px 14px 15px;
      display:flex; flex-direction:column; align-items:center; gap:10px;
      backdrop-filter:blur(8px);
      transition:background .22s, transform .22s;
    }
    .mosaic-card:hover { background:rgba(255,255,255,0.13); transform:translateY(-4px); }
    .mosaic-card.wide { grid-column:1/-1; flex-direction:row; gap:18px; padding:18px 22px; }
    .m-ph {
      border-radius:13px;
      background:rgba(255,255,255,0.08);
      border:2px dashed rgba(82,183,136,0.4);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:6px; text-align:center; padding:9px;
      color:rgba(82,183,136,0.7); font-size:0.61rem; font-weight:800; line-height:1.4;
    }
    .m-ph .phi { font-size:1.8rem; opacity:0.6; }
    .mosaic-card.wide .m-ph { width:88px; height:108px; flex-shrink:0; }
    .mosaic-card:not(.wide) .m-ph { width:74px; height:94px; }
    .m-info h4 {
      font-family:'Playfair Display',serif; font-size:1rem; font-weight:700;
      color:#fff; margin-bottom:3px; line-height:1.25;
    }
    .m-info .m-brand { font-size:0.66rem; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--moss); margin-bottom:3px; }
    .m-info span { font-size:0.75rem; color:rgba(255,255,255,0.55); line-height:1.45; display:block; }
    .m-name-sm { font-size:0.75rem; font-weight:800; color:rgba(255,255,255,0.85); text-align:center; line-height:1.3; }
    .m-brand-sm { font-size:0.64rem; color:rgba(255,255,255,0.45); text-align:center; }

    /* ── STRIP ── */
    .strip {
      background:linear-gradient(90deg,var(--forest) 0%,var(--moss) 55%,var(--amber) 100%);
      padding:17px 36px;
    }
    .strip-inner {
      max-width:1200px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-around; gap:18px; flex-wrap:wrap;
    }
    .si { display:flex; align-items:center; gap:11px; color:#fff; }
    .si .ico { font-size:1.45rem; }
    .si strong { display:block; font-size:0.86rem; font-weight:800; }
    .si span { font-size:0.73rem; opacity:0.82; }

    /* ── TAB NAV ── */
    .cat-nav {
      background:var(--warm);
      border-bottom:2px solid var(--gray);
      position:sticky; top:68px; z-index:200;
      box-shadow:0 3px 14px rgba(27,67,50,0.08);
    }
    .cat-nav-inner {
      max-width:1200px; margin:0 auto; padding:0 36px;
      display:flex; align-items:center; gap:0;
      overflow-x:auto; scrollbar-width:none;
    }
    .cat-nav-inner::-webkit-scrollbar { display:none; }
    .cat-btn {
      display:flex; align-items:center; gap:7px;
      padding:15px 20px; background:none; border:none;
      font-family:'Nunito',sans-serif; font-size:0.87rem; font-weight:800;
      color:var(--muted); cursor:pointer; white-space:nowrap;
      border-bottom:3px solid transparent; margin-bottom:-2px;
      transition:color .18s;
    }
    .cat-btn:hover { color:var(--text); }
    .cat-btn.af { color:var(--forest);   border-bottom-color:var(--forest); }
    .cat-btn.aa { color:var(--amber);    border-bottom-color:var(--amber); }
    .cat-btn.at { color:var(--terra);    border-bottom-color:var(--terra); }
    .cat-btn.al { color:var(--lavender); border-bottom-color:var(--lavender); }
    .cat-btn.as { color:var(--sky);      border-bottom-color:var(--sky); }
    .cat-btn.ar { color:var(--rose);     border-bottom-color:var(--rose); }
    .cat-icon { font-size:1.1rem; }
    .cat-search {
      margin-left:auto; display:flex; align-items:center; gap:9px;
      background:var(--sand); border:2px solid var(--gray);
      border-radius:30px; padding:7px 16px; flex-shrink:0;
      transition:border-color .2s;
    }
    .cat-search:focus-within { border-color:var(--forest); }
    .cat-search input {
      background:none; border:none; outline:none;
      font-family:'Nunito',sans-serif; font-size:0.85rem; font-weight:700;
      color:var(--text); width:160px;
    }
    .cat-search input::placeholder { color:var(--muted); }

    /* ── MAIN ── */
    .main-wrap {
      max-width:1200px; margin:0 auto; padding:52px 36px 80px;
    }

    .sec-lbl { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
    .sec-lbl h2 {
      font-family:'Playfair Display',serif;
      font-size:1.6rem; font-weight:700; color:var(--text);
    }
    .sec-line { flex:1; height:1.5px; border-radius:2px; }
    .sl-f { background:linear-gradient(90deg,var(--forest),transparent); }
    .sl-a { background:linear-gradient(90deg,var(--amber),transparent); }
    .sl-t { background:linear-gradient(90deg,var(--terra),transparent); }
    .sl-l { background:linear-gradient(90deg,var(--lavender),transparent); }
    .sl-s { background:linear-gradient(90deg,var(--sky),transparent); }
    .sl-r { background:linear-gradient(90deg,var(--rose),transparent); }
    .sec-desc { font-size:0.87rem; color:var(--muted); line-height:1.65; margin-bottom:26px; max-width:640px; font-weight:600; }

    /* info banner */
    .info-banner {
      border-radius:16px; padding:15px 20px;
      display:flex; align-items:center; gap:13px;
      margin-bottom:26px; font-size:0.86rem; font-weight:700; line-height:1.5;
    }
    .info-banner .bi { font-size:1.7rem; flex-shrink:0; }
    .ib-f { background:var(--forest-lt); color:var(--forest-dk); }
    .ib-a { background:var(--amber-lt);  color:var(--amber-dk); }
    .ib-t { background:var(--terra-lt);  color:var(--terra-dk); }
    .ib-l { background:var(--lavender-lt); color:var(--lavender-dk); }
    .ib-s { background:var(--sky-lt);    color:var(--sky-dk); }
    .ib-r { background:var(--rose-lt);   color:var(--rose-dk); }

    /* sub label */
    .sub-lbl { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .sub-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
    .sub-lbl h3 { font-family:'Playfair Display',serif; font-size:1rem; font-weight:600; color:var(--muted); }

    /* ── PRODUCT GRID ── */
    .prod-grid {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:18px; margin-bottom:44px;
    }
    .prod-card {
      background:var(--warm); border-radius:22px; overflow:hidden;
      box-shadow:0 3px 16px rgba(27,67,50,0.08);
      display:flex; flex-direction:column;
      border:2px solid transparent;
      transition:transform .22s, box-shadow .22s, border-color .22s;
    }
    .prod-card:hover {
      transform:translateY(-6px);
      box-shadow:0 14px 40px rgba(27,67,50,0.14);
    }
    .prod-card.cf:hover  { border-color:var(--moss); }
    .prod-card.ca:hover  { border-color:rgba(212,136,58,.4); }
    .prod-card.ct:hover  { border-color:rgba(188,108,37,.4); }
    .prod-card.cl:hover  { border-color:rgba(155,114,207,.4); }
    .prod-card.cs:hover  { border-color:rgba(72,176,213,.4); }
    .prod-card.cr:hover  { border-color:rgba(192,123,138,.4); }

    /* image */
    .prod-img {
      height:196px; position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center;
    }
    .bg-f { background:linear-gradient(145deg,#e8f5ee,#c8eada); }
    .bg-a { background:linear-gradient(145deg,#fef3e2,#f8e0b8); }
    .bg-t { background:linear-gradient(145deg,#fde8d0,#f8ccaa); }
    .bg-l { background:linear-gradient(145deg,#f0e9fb,#ddd0f5); }
    .bg-s { background:linear-gradient(145deg,#e4f4fb,#c4e6f5); }
    .bg-r { background:linear-gradient(145deg,#faeef1,#f5d4dc); }

    .img-ph {
      width:116px; height:155px; border-radius:14px;
      background:rgba(255,255,255,0.75);
      border:2.5px dashed rgba(0,0,0,0.12);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:8px; text-align:center;
      padding:12px; backdrop-filter:blur(4px);
    }
    .img-ph .phi { font-size:2.1rem; opacity:0.36; }
    .img-ph .phl { font-size:0.61rem; font-weight:800; color:rgba(0,0,0,0.28); line-height:1.4; }

    /* badges */
    .cat-badge {
      position:absolute; top:11px; left:11px;
      font-size:0.65rem; font-weight:800;
      padding:3px 10px; border-radius:20px;
      text-transform:uppercase; letter-spacing:0.06em;
    }
    .cb-f { background:var(--forest-lt); color:var(--forest-dk); }
    .cb-a { background:var(--amber-lt);  color:var(--amber-dk); }
    .cb-t { background:var(--terra-lt);  color:var(--terra-dk); }
    .cb-l { background:var(--lavender-lt); color:var(--lavender-dk); }
    .cb-s { background:var(--sky-lt);    color:var(--sky-dk); }
    .cb-r { background:var(--rose-lt);   color:var(--rose-dk); }

    .cert-badge {
      position:absolute; top:11px; right:11px;
      background:rgba(255,255,255,0.88);
      font-size:0.63rem; font-weight:800; padding:3px 9px;
      border-radius:20px; color:var(--forest-dk); backdrop-filter:blur(4px);
    }
    .fav-badge {
      position:absolute; bottom:10px; right:10px;
      background:linear-gradient(135deg,var(--honey),#f5c842);
      color:var(--forest-dk); font-size:0.61rem; font-weight:800;
      padding:3px 8px; border-radius:20px;
    }

    /* card body */
    .prod-body { padding:15px 17px 20px; flex:1; display:flex; flex-direction:column; gap:6px; }
    .prod-brand { font-size:0.67rem; font-weight:800; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); }
    .prod-name { font-size:0.94rem; font-weight:800; color:var(--text); line-height:1.35; }
    .prod-desc { font-size:0.79rem; color:var(--muted); line-height:1.55; flex:1; }
    .prod-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:2px; }
    .prod-tag { font-size:0.65rem; font-weight:800; padding:3px 10px; border-radius:20px; }
    .tg-f { background:var(--forest-lt); color:var(--forest-dk); }
    .tg-a { background:var(--amber-lt);  color:var(--amber-dk); }
    .tg-t { background:var(--terra-lt);  color:var(--terra-dk); }
    .tg-l { background:var(--lavender-lt); color:var(--lavender-dk); }
    .tg-s { background:var(--sky-lt);    color:var(--sky-dk); }
    .tg-r { background:var(--rose-lt);   color:var(--rose-dk); }
    .prod-div { height:1px; background:var(--sand); margin:4px 0; }
    .prod-avail {
      font-size:0.72rem; color:var(--muted); font-weight:700;
      display:flex; align-items:center; gap:6px;
    }
    .prod-avail::before {
      content:''; width:7px; height:7px; border-radius:50%;
      background:var(--forest); display:inline-block;
    }

    .tab-section { display:block; }
    .tab-section.hidden { display:none; }

    /* ── NATURE GUIDE BAND ── */
    .guide-band {
      background:linear-gradient(135deg,var(--forest-dk) 0%,#1e3a28 100%);
      padding:52px 36px; position:relative; overflow:hidden;
    }
    .guide-band::before {
      content:'🌿🌱🍃🌾🌻';
      position:absolute; font-size:8rem; opacity:0.04;
      top:-20px; right:-20px; letter-spacing:12px; pointer-events:none;
    }
    .guide-inner { max-width:1200px; margin:0 auto; position:relative; z-index:1; }
    .guide-inner h2 {
      font-family:'Playfair Display',serif;
      font-size:1.8rem; font-weight:700; color:#fff; margin-bottom:6px;
    }
    .guide-inner .g-sub { font-size:0.87rem; color:rgba(255,255,255,0.5); margin-bottom:32px; }
    .guide-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }
    .guide-card {
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:18px; padding:22px 18px;
      backdrop-filter:blur(4px); transition:background .2s;
    }
    .guide-card:hover { background:rgba(255,255,255,0.1); }
    .g-emoji { font-size:2rem; margin-bottom:12px; display:block; }
    .guide-card h4 {
      font-family:'Playfair Display',serif;
      font-size:1.02rem; font-weight:700; color:#fff; margin-bottom:7px;
    }
    .guide-card p { font-size:0.8rem; color:rgba(255,255,255,0.6); line-height:1.6; }
    .g-tip {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(82,183,136,0.18); color:var(--moss);
      border-radius:20px; padding:3px 12px; font-size:0.68rem;
      font-weight:800; margin-top:10px;
    }

    /* ── FOOTER ── */
    footer {
      background:var(--bark); color:rgba(255,255,255,0.4);
      text-align:center; padding:24px 36px; font-size:0.81rem;
    }
    footer a { color:var(--moss); text-decoration:none; }
    footer a:hover { color:#fff; }

    /* ── RESPONSIVE ── */
    @media(max-width:1024px) { .prod-grid { grid-template-columns:repeat(3,1fr); } .guide-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:768px)  {
      .hero-inner { grid-template-columns:1fr; }
      .hero-mosaic { display:none; }
      .prod-grid { grid-template-columns:repeat(2,1fr); }
    }
    @media(max-width:500px)  { .prod-grid { grid-template-columns:1fr; } .guide-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>

<span class="leaf-deco" style="top:160px;right:30%;animation-duration:13s;animation-delay:-6s;font-size:3.5rem;">🌱</span>

    <div style="display:flex;align-items:center;gap:14px;">
      <a class="logo-link" href="farmacias_yair.html">
    <img src="https://raw.githubusercontent.com/garcia04brayan-hue/negocio/main/logo.png" 
             style="height: 60px; display: block;">

      <div class="hdr-sep"></div>
      <span class="hdr-title">🌿 Catálogo · Productos Naturales</span>
    </div>
    <nav class="hdr-nav">
      <a href="medicamentos.html">Medicamentos</a>
